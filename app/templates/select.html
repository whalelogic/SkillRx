<div id="label-chip" hx-swap-oob="true">
  {{template "label-chip-inner" .}}
</div>

<div id="formulary" hx-swap-oob="true">
  <div class="formulary-label">rxlib / categories</div>
  {{template "formulary" .}}
</div>

<div id="source-panel-content" hx-swap-oob="true">
  {{template "source-inner" .}}
</div>

<input type="hidden" id="input-category" name="category" value="{{.ActiveCategory}}" hx-swap-oob="true">
<input type="hidden" id="input-entry" name="entry" value="{{.ActiveEntry}}" hx-swap-oob="true">

<div id="chat-messages" hx-swap-oob="true">
  <div class="msg assistant">
    <div class="msg-avatar">℞</div>
    <div class="msg-body">
      <div class="msg-role">{{.ActiveLabel}}</div>
      <div class="msg-content markdown">Loaded **{{.ActiveLabel}}** from `{{.SourcePath}}`. Send a prompt to test this library document's instructions.</div>
    </div>
  </div>
</div>
